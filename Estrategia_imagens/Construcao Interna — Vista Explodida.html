<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Técnica — Mochila Viva — Costado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F4F5F7;
    color: #1a1a1a;
  }
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 44px;
  }
  .header { margin-bottom: 28px; text-align: center; }
  .header-tag {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: #0891B2; margin-bottom: 10px;
  }
  .header h1 {
    font-size: 28px; font-weight: 900;
    line-height: 1.15; color: #0E1117; margin-bottom: 6px;
  }
  .header p {
    font-size: 13px; color: #94A3B8;
    font-style: italic;
  }
  .diagram-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 20px 28px;
    margin-bottom: 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .diagram-svg {
    display: block; margin: 0 auto;
    width: 100%;
  }
  .footer {
    text-align: center; margin-top: 20px;
    padding-top: 14px; border-top: 1px solid #E2E8F0;
  }
  .footer p {
    font-size: 9px; color: #B0BEC5;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-tag">Ficha Técnica — Construção do Costado</div>
    <h1>Vista Explodida — 3 Camadas</h1>
    <p>Construção interna do costado da Mochila Viva · Materiais reforçados</p>
  </header>

  <div class="diagram-card">
    <svg class="diagram-svg" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg">

      <!-- ================================================ -->
      <!-- CAMADA 1 — TECIDO EXTERNO · PRETO                -->
      <!-- ================================================ -->
      <g>
        <!-- Top face -->
        <path d="M80 60 L340 40 L440 70 L180 90 Z" fill="#3A3A3A"/>
        <!-- Front face -->
        <path d="M80 60 L180 90 L180 135 L80 105 Z" fill="#1A1A1A"/>
        <!-- Right face -->
        <path d="M180 90 L440 70 L440 115 L180 135 Z" fill="#2A2A2A"/>

        <!-- Fabric texture -->
        <g opacity="0.06">
          <line x1="185" y1="96" x2="435" y2="76" stroke="#fff" stroke-width="0.6"/>
          <line x1="185" y1="103" x2="435" y2="83" stroke="#fff" stroke-width="0.6"/>
          <line x1="185" y1="110" x2="435" y2="90" stroke="#fff" stroke-width="0.6"/>
          <line x1="185" y1="117" x2="435" y2="97" stroke="#fff" stroke-width="0.6"/>
          <line x1="185" y1="124" x2="435" y2="104" stroke="#fff" stroke-width="0.6"/>
          <line x1="185" y1="131" x2="435" y2="111" stroke="#fff" stroke-width="0.6"/>
        </g>

        <!-- Text -->
        <text x="300" y="98" text-anchor="middle" fill="#fff" font-size="14" font-weight="800" opacity="0.95">1. TECIDO EXTERNO</text>
        <text x="300" y="114" text-anchor="middle" fill="#fff" font-size="10" font-weight="500" opacity="0.6">Nylon Poli PVC 600 · Preto Liso</text>

        <!-- Edge highlights -->
        <path d="M80 60 L180 90" stroke="#fff" stroke-width="0.8" opacity="0.15"/>
        <path d="M80 60 L340 40" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
        <path d="M80 60 L80 105" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
      </g>

      <!-- Connector + Icon 1 -->
      <line x1="442" y1="92" x2="510" y2="92" stroke="#333" stroke-width="1.5"/>
      <circle cx="510" cy="92" r="3" fill="#333"/>
      <circle cx="545" cy="92" r="24" fill="#F8FAFC" stroke="#1a1a1a" stroke-width="2"/>
      <text x="545" y="98" text-anchor="middle" font-size="18">💧</text>
      <text x="580" y="82" fill="#0E1117" font-size="12" font-weight="700">Impermeável + UV</text>
      <text x="580" y="97" fill="#64748B" font-size="10">"Material reforçado"</text>
      <text x="580" y="112" fill="#64748B" font-size="10">Proteção contra água e sol</text>

      <!-- ================================================ -->
      <!-- SETA 1→2                                          -->
      <!-- ================================================ -->
      <g opacity="0.25">
        <path d="M260 138 L260 175" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="255,172 260,182 265,172" fill="#94A3B8"/>
      </g>

      <!-- ================================================ -->
      <!-- CAMADA 2 — E.V.A. 8mm · CINZA                    -->
      <!-- ================================================ -->
      <g transform="translate(0, 130)">
        <!-- Top face -->
        <path d="M80 60 L340 40 L440 70 L180 90 Z" fill="#B0B0B0"/>
        <!-- Front face -->
        <path d="M80 60 L180 90 L180 135 L80 105 Z" fill="#808080"/>
        <!-- Right face -->
        <path d="M180 90 L440 70 L440 115 L180 135 Z" fill="#999999"/>

        <!-- Foam dots texture -->
        <g opacity="0.08">
          <circle cx="220" cy="100" r="4" fill="#555"/>
          <circle cx="260" cy="108" r="5" fill="#555"/>
          <circle cx="310" cy="96" r="4" fill="#555"/>
          <circle cx="350" cy="105" r="5" fill="#555"/>
          <circle cx="390" cy="95" r="4" fill="#555"/>
          <circle cx="420" cy="103" r="3" fill="#555"/>
          <circle cx="240" cy="118" r="4" fill="#555"/>
          <circle cx="290" cy="125" r="5" fill="#555"/>
          <circle cx="340" cy="118" r="4" fill="#555"/>
          <circle cx="380" cy="125" r="3" fill="#555"/>
        </g>

        <!-- Text -->
        <text x="300" y="98" text-anchor="middle" fill="#fff" font-size="14" font-weight="800" opacity="0.95">2. E.V.A. 8mm</text>
        <text x="300" y="114" text-anchor="middle" fill="#fff" font-size="10" font-weight="500" opacity="0.7">Espuma rígida · Alta densidade</text>

        <!-- Edge highlights -->
        <path d="M80 60 L180 90" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
        <path d="M80 60 L340 40" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
        <path d="M80 60 L80 105" stroke="#fff" stroke-width="0.5" opacity="0.15"/>

        <!-- 8mm indicator -->
        <line x1="72" y1="62" x2="72" y2="103" stroke="#555" stroke-width="1.2"/>
        <line x1="67" y1="62" x2="77" y2="62" stroke="#555" stroke-width="0.8"/>
        <line x1="67" y1="103" x2="77" y2="103" stroke="#555" stroke-width="0.8"/>
        <text x="62" y="87" fill="#555" font-size="9" font-weight="800" text-anchor="end">8mm</text>
      </g>

      <!-- Connector + Icon 2 -->
      <line x1="442" y1="222" x2="510" y2="222" stroke="#808080" stroke-width="1.5"/>
      <circle cx="510" cy="222" r="3" fill="#808080"/>
      <circle cx="545" cy="222" r="24" fill="#F8FAFC" stroke="#808080" stroke-width="2"/>
      <text x="545" y="228" text-anchor="middle" font-size="18">🛡️</text>
      <text x="580" y="212" fill="#0E1117" font-size="12" font-weight="700">Estrutura + Amortecimento</text>
      <text x="580" y="227" fill="#64748B" font-size="10">"Suporta água"</text>
      <text x="580" y="242" fill="#64748B" font-size="10">"Encostado rígido"</text>

      <!-- ================================================ -->
      <!-- SETA 2→3                                          -->
      <!-- ================================================ -->
      <g opacity="0.25">
        <path d="M260 268 L260 305" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="255,302 260,312 265,302" fill="#94A3B8"/>
      </g>

      <!-- ================================================ -->
      <!-- CAMADA 3 — FORRO INTERNO · PRETO                  -->
      <!-- ================================================ -->
      <g transform="translate(0, 260)">
        <!-- Top face -->
        <path d="M80 60 L340 40 L440 70 L180 90 Z" fill="#383838"/>
        <!-- Front face -->
        <path d="M80 60 L180 90 L180 135 L80 105 Z" fill="#181818"/>
        <!-- Right face -->
        <path d="M180 90 L440 70 L440 115 L180 135 Z" fill="#282828"/>

        <!-- Smooth sheen texture -->
        <g opacity="0.04">
          <ellipse cx="310" cy="100" rx="90" ry="12" fill="#fff"/>
          <ellipse cx="300" cy="115" rx="70" ry="8" fill="#fff"/>
        </g>

        <!-- Text -->
        <text x="300" y="98" text-anchor="middle" fill="#fff" font-size="14" font-weight="800" opacity="0.95">3. FORRO INTERNO</text>
        <text x="300" y="114" text-anchor="middle" fill="#fff" font-size="10" font-weight="500" opacity="0.6">Nylon acoplado liso</text>

        <!-- Edge highlights -->
        <path d="M80 60 L180 90" stroke="#fff" stroke-width="0.8" opacity="0.12"/>
        <path d="M80 60 L340 40" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
        <path d="M80 60 L80 105" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
      </g>

      <!-- Connector + Icon 3 -->
      <line x1="442" y1="352" x2="510" y2="352" stroke="#333" stroke-width="1.5"/>
      <circle cx="510" cy="352" r="3" fill="#333"/>
      <circle cx="545" cy="352" r="24" fill="#F8FAFC" stroke="#1a1a1a" stroke-width="2"/>
      <text x="545" y="358" text-anchor="middle" font-size="18">✨</text>
      <text x="580" y="342" fill="#0E1117" font-size="12" font-weight="700">Conforto nas costas</text>
      <text x="580" y="357" fill="#64748B" font-size="10">"Evita atrito c/ roupas</text>
      <text x="580" y="372" fill="#64748B" font-size="10">utilizadas por equipe"</text>

      <!-- ================================================ -->
      <!-- EXTERIOR / INTERIOR                               -->
      <!-- ================================================ -->
      <text x="260" y="30" text-anchor="middle" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">↑ EXTERIOR</text>
      <text x="260" y="418" text-anchor="middle" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">↓ INTERIOR (COSTAS)</text>

      <!-- ================================================ -->
      <!-- BANNER LARGO                                      -->
      <!-- ================================================ -->
      <rect x="20" y="435" width="760" height="80" rx="14" fill="#0E1117"/>
      <text x="400" y="465" text-anchor="middle" fill="#fff" font-size="16" font-weight="900" letter-spacing="1.5">3 CAMADAS DE PROTEÇÃO E CONFORTO</text>
      <text x="130" y="497" fill="#fff" font-size="13" opacity="0.8">💧 impermeável</text>
      <text x="310" y="497" fill="#fff" font-size="13" opacity="0.8">☀️ UV</text>
      <text x="445" y="497" fill="#fff" font-size="13" opacity="0.8">🛡️ rígido</text>
      <text x="590" y="497" fill="#fff" font-size="13" opacity="0.8">✨ conforto</text>
      <text x="270" y="497" fill="#fff" font-size="13" opacity="0.4">·</text>
      <text x="410" y="497" fill="#fff" font-size="13" opacity="0.4">·</text>
      <text x="555" y="497" fill="#fff" font-size="13" opacity="0.4">·</text>

    </svg>
  </div>

  <footer class="footer">
    <p>Mochila Viva — Marketing Promocional — Ficha Técnica — Construção do Costado</p>
  </footer>
</div>
</body>
</html>
