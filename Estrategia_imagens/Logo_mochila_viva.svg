  <!-- Small decorative circle (dot above i) -->
  <circle cx="375" cy="223" r="22" fill="none" stroke="#FFFFFF" stroke-width="5" />
  <circle cx="375" cy="223" r="10" fill="#FFFFFF" />

  <!-- MOCHILA text -->
  <text x="300" y="323" text-anchor="middle" font-family="Nunito, Arial Rounded MT Bold, Arial, sans-serif" font-weight="900" font-size="82" fill="#8B6914" letter-spacing="1">MOCHILA</text>

  <!-- VIVA text -->
  <text x="404" y="398" text-anchor="middle" font-family="Nunito, Arial Rounded MT Bold, Arial, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" letter-spacing="1">VIVA</text>
</svg>