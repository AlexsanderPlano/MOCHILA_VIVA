<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Compositor — Capa com Logo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e8e8f0; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 16px; color: #F5A623; }

  .controls {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
  }
  .control { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .control label { font-size: 11px; color: #8888a0; text-transform: uppercase; letter-spacing: 1px; }
  .control input[type="range"] { width: 140px; accent-color: #F5A623; }
  .control .val { font-size: 13px; font-weight: 700; color: #fff; min-width: 40px; text-align: center; }

  .btn-export {
    background: #F5A623; color: #1a1a2e; border: none; padding: 10px 24px;
    font-weight: 800; font-size: 13px; border-radius: 8px; cursor: pointer;
    margin-bottom: 20px;
  }
  .btn-export:hover { background: #d4901a; }

  .canvas-area {
    position: relative;
    width: 1024px; height: 1024px;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .canvas-area img.base {
    width: 100%; height: 100%; object-fit: contain;
  }
  .logo-overlay {
    position: absolute;
    pointer-events: none;
  }
  .logo-overlay img {
    width: 100%; height: 100%;
  }

  .info { font-size: 11px; color: #8888a0; margin-top: 12px; }
</style>
</head>
<body>

<h1>Compositor — Capa + Logo Mochila Viva</h1>

<div class="controls">
  <div class="control">
    <label>Tamanho Logo</label>
    <input type="range" id="logoSize" min="80" max="500" value="260">
    <span class="val" id="logoSizeVal">260px</span>
  </div>
  <div class="control">
    <label>Posicao X</label>
    <input type="range" id="logoPosX" min="0" max="1024" value="382">
    <span class="val" id="logoPosXVal">382</span>
  </div>
  <div class="control">
    <label>Posicao Y</label>
    <input type="range" id="logoPosY" min="0" max="1024" value="118">
    <span class="val" id="logoPosYVal">118</span>
  </div>
</div>

<button class="btn-export" onclick="exportar()">Exportar PNG 1024x1024</button>

<div class="canvas-area" id="canvas">
  <img class="base" src="Fotos_Infograficos_aprovados/Foto_Capa_Aprovada.PNG" alt="Capa">
  <div class="logo-overlay" id="logoOverlay">
    <img src="Logo_mochila_viva.svg" alt="Logo">
  </div>
</div>

<div class="info">Ajuste os controles para posicionar a logo no centro do disco laranja. Depois clique Exportar.</div>

<script>
  const overlay = document.getElementById('logoOverlay');
  const sizeSlider = document.getElementById('logoSize');
  const posXSlider = document.getElementById('logoPosX');
  const posYSlider = document.getElementById('logoPosY');

  function update() {
    const s = parseInt(sizeSlider.value);
    const x = parseInt(posXSlider.value);
    const y = parseInt(posYSlider.value);

    overlay.style.width = s + 'px';
    overlay.style.height = s + 'px';
    overlay.style.left = (x - s/2) + 'px';
    overlay.style.top = (y - s/2) + 'px';

    document.getElementById('logoSizeVal').textContent = s + 'px';
    document.getElementById('logoPosXVal').textContent = x;
    document.getElementById('logoPosYVal').textContent = y;
  }

  sizeSlider.addEventListener('input', update);
  posXSlider.addEventListener('input', update);
  posYSlider.addEventListener('input', update);
  update();

  async function exportar() {
    const canvas = await html2canvas(document.getElementById('canvas'), {
      width: 1024,
      height: 1024,
      scale: 1,
      useCORS: true,
      backgroundColor: '#ffffff'
    });
    const link = document.createElement('a');
    link.download = 'Capa_com_logo.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>
